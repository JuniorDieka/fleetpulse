version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:3.2.0-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: 'dbt-core dbt-duckdb pandas pyarrow scipy pyyaml requests'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./fleetpulse:/opt/airflow/fleetpulse
    - ./dbt_project:/opt/airflow/dbt_project
    - ./config.yaml:/opt/airflow/config.yaml
    - ./alerts:/opt/airflow/alerts
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    kafka:
      condition: service_healthy

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: fleetpulse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - fleetpulse

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: fleetpulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics.sh --create --if-not-exists --topic fleet_telemetry --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        echo "Kafka topic 'fleet_telemetry' created"
    networks:
      - fleetpulse

  telemetry-producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: fleetpulse-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./fleetpulse:/app/fleetpulse
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - fleetpulse

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: fleetpulse-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./fleetpulse:/app/fleetpulse
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - fleetpulse

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/data/warehouse
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fleetpulse.com \
          --password admin
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    user: "0:0"
    networks:
      - fleetpulse

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - fleetpulse

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - fleetpulse

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: fleetpulse-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./fleetpulse:/app/fleetpulse
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - fleetpulse

volumes:
  airflow-logs:

networks:
  fleetpulse:
    driver: bridge
