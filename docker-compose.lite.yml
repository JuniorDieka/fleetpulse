version: '3.8'

# Lite Mode - No Kafka, Direct Parquet Writing
# Suitable for Windows machines without Docker Kafka or slower systems

x-airflow-common:
  &airflow-common
  image: apache/airflow:3.2.0-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: 'dbt-core dbt-duckdb pandas pyarrow scipy pyyaml requests'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./fleetpulse:/opt/airflow/fleetpulse
    - ./dbt_project:/opt/airflow/dbt_project
    - ./config.yaml:/opt/airflow/config.yaml
    - ./alerts:/opt/airflow/alerts
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"

services:
  telemetry-writer:
    build:
      context: .
      dockerfile: Dockerfile.lite
    container_name: fleetpulse-writer-lite
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./fleetpulse:/app/fleetpulse
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - fleetpulse

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir dbt-core dbt-duckdb pandas pyarrow scipy pyyaml requests structlog python-json-logger
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/data/warehouse
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fleetpulse.com \
          --password admin || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    user: "0:0"
    networks:
      - fleetpulse

  airflow-webserver:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir dbt-core dbt-duckdb pandas pyarrow scipy pyyaml requests structlog python-json-logger
        airflow standalone
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - fleetpulse

  airflow-scheduler:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir dbt-core dbt-duckdb pandas pyarrow scipy pyyaml requests structlog python-json-logger
        airflow scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - fleetpulse

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: fleetpulse-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./fleetpulse:/app/fleetpulse
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - fleetpulse

volumes:
  airflow-logs:

networks:
  fleetpulse:
    driver: bridge
